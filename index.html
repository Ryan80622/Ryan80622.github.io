<!DOCTYPE html>
<html>
<head>
  <title>Test1</title>
  
  h1 {
    text-align: center;
  }
  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .center-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    padding: 30px;
    background: #f5f5f5;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  .center-box input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
  }

  .center-box button {
    width: 95%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</style>
</head>
<body>
  <h1>Test1</h1>
  <p>Ryan Laqtib</p>
  <div class="center-box">
  <h2>Sign Up</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="goNext()">Done</button>
</div>
</body>
</html>
