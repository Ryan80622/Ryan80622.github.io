<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    /* Center title */
    .title {
      text-align: center;
      margin-top: 40px;
    }

    .title h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .title p {
      font-size: 20px;
      color: gray;
    }

    /* Center sign up box */
    .center-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      padding: 30px;
      background: #f5f5f5;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .center-box input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .center-box button {
      width: 95%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .center-box button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <!-- Title -->
  <div class="title">
    <h1>Welcome</h1>
    <p>Ryan Laqtib</p>
  </div>

  <!-- Sign up box -->
  <div class="center-box">
    <h2>Sign Up</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="goNext()">Done</button>
  </div>

  <!-- JavaScript -->
  <script>
    function goNext() {
      // Change this later to wherever you want
      window.location.href = "https://example.com";
    }
  </script>

</body>
</html>
